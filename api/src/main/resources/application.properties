spring.application.name=backend
# Perfil opcional para desarrollo PostgreSQL:
#   SPRING_PROFILES_ACTIVE=dev-postgres

# --- CONEXIÓN A BASE DE DATOS (POSTGRESQL LOCAL) ---
# Defaults locales. Puedes sobreescribir con variables de entorno.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cargohub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE (JPA) ---
# Modo estable en desarrollo: conserva esquema/datos entre reinicios.
# Para reset puntual del esquema: exporta JPA_DDL_AUTO=create-drop
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar las consultas SQL en la consola (útil para ver qué hace)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- MCP WEBHOOK CONFIGURATION ---
# URL del webhook de n8n para calcular dimensiones del pedido
mcp.webhook.url=http://localhost:5678/webhook/crear-porte

# --- JWT SECURITY CONFIGURATION ---
# Use environment variables in production (never hardcode secrets)
# Example (PowerShell): $env:JWT_SECRET="a-very-long-random-secret-at-least-32-chars"
security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- DEV SEEDER (manual opt-in) ---
# Activar con: APP_SEED_ENABLED=true o --app.seed.enabled=true
app.seed.enabled=${APP_SEED_ENABLED:false}
