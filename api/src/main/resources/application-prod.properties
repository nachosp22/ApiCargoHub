# ============================================
# Production Profile — Render deployment
# ============================================

# --- DATABASE (PostgreSQL from Render) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- CORS (restrict to Vercel domain) ---
# Override in SecurityConfig via env var:
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-app.vercel.app}

# --- SERVER ---
server.port=${PORT:8080}

# --- LOGGING ---
logging.level.root=WARN
logging.level.com.cargohub=INFO

# --- SECURITY ---
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- GEMINI ---
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.id=${GEMINI_MODEL_ID:gemini-2.0-flash}

# --- CARGO ANALYSIS DEV FALLBACK (always off in prod) ---
cargo.analysis.dev-fallback.enabled=false

# --- SEEDER (disabled in prod) ---
app.seed.enabled=false
