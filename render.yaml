services:
  - type: web
    name: cargohub-api
    runtime: docker
    dockerfilePath: api/Dockerfile
    dockerContext: api
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: cargohub-db
          property: connectionURI
      - key: DB_USERNAME
        fromDatabase:
          name: cargohub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cargohub-db
          property: password

databases:
  - name: cargohub-db
    plan: free
    databaseName: cargohub
    postgresMajorVersion: "16"
